name: Release MCPB Bundle

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    env:
      TYPST_VERSION: "0.14.2"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Typst binary
        run: |
          mkdir -p bin
          if [ "${{ matrix.os }}" = "linux" ] && [ "${{ matrix.arch }}" = "amd64" ]; then
            TYPST_TARGET="x86_64-unknown-linux-musl"
          elif [ "${{ matrix.os }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            TYPST_TARGET="aarch64-unknown-linux-musl"
          elif [ "${{ matrix.os }}" = "darwin" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            TYPST_TARGET="aarch64-apple-darwin"
          fi
          curl -sSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-${TYPST_TARGET}.tar.xz" | tar -xJ --strip-components=1 -C bin
          chmod +x bin/typst
          bin/typst --version

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Update version in manifests
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json && mv manifest.tmp.json manifest.json
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp.json && mv server.tmp.json server.json

      - uses: NimbleBrainInc/mcpb-pack@v2
        with:
          output: "{name}-{version}-${{ matrix.os }}-${{ matrix.arch }}.mcpb"
          announce-required: "true"
